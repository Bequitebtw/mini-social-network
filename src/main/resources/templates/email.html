<div style="margin-top: 2rem;">
    <button id="resendBtn" style="padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">
        Отправить ещё раз
    </button>
    <a th:href="@{/login}" style="margin-left: 1rem; color: #667eea;">Войти</a>
</div>

<script>
    const resendBtn = document.getElementById('resendBtn');

    resendBtn.addEventListener('click', async () => {
        resendBtn.disabled = true;
        resendBtn.textContent = 'Отправка...';

        const email = /*[[${param.email}]]*/ 'user@example.com'; // Thymeleaf подставит email

        try {
            const response = await fetch('/api/resend-activation', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const result = await response.json();

            if (response.ok) {
                alert('Письмо отправлено повторно! Проверьте почту.');
            } else {
                switch(result.code) {
                    case 'USER_NOT_FOUND':
                        alert('Пользователь с таким email не найден.');
                        break;
                    case 'ALREADY_ACTIVE':
                        alert('Пользователь уже активирован.');
                        break;
                    case 'RATE_LIMIT':
                        alert('Повторная отправка возможна через 5 минут.');
                        break;
                    default:
                        alert(result.message || 'Ошибка отправки письма.');
                }
            }
        } catch (err) {
            alert('Ошибка сети. Попробуйте позже.');
        } finally {
            resendBtn.disabled = false;
            resendBtn.textContent = 'Отправить ещё раз';
        }
    });
</script>
