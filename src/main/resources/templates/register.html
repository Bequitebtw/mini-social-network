<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 2.5rem;
            font-size: 2.2rem;
            font-weight: 300;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .form-group {
            position: relative;
            margin-bottom: 1.8rem;
        }
        label {
            display: block;
            margin-bottom: 0.7rem;
            color: #4a5568;
            font-weight: 500;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 1.2rem 1.2rem 1.2rem 3rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            background: #f8fafc;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }
        .input-icon {
            position: absolute;
            left: 1.2rem;
            top: 3.3rem;
            font-size: 1.2rem;
            color: #a0aec0;
            transition: color 0.3s ease;
        }
        input:focus + .input-icon { color: #667eea; }
        .password-match {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            border-radius: 8px;
            font-weight: 500;
        }
        .match { background: #d4edda; color: #155724; }
        .mismatch { background: #f8d7da; color: #721c24; }
        button {
            width: 100%;
            padding: 1.3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 1rem;
        }
        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-weight: 500;
            text-align: center;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="form-container">
    <h1>Регистрация</h1>

    <!-- Сообщения -->
    <div id="message" class="message hidden"></div>

    <form id="registerForm">
        <!-- Username -->
        <div class="form-group">
            <label for="username">Логин</label>
            <div class="input-icon">👤</div>
            <input type="text" id="username" name="username" required
                   minlength="3" maxlength="20" placeholder="МойЛогин123">
        </div>

        <!-- Email -->
        <div class="form-group">
            <label for="email">Email</label>
            <div class="input-icon">✉️</div>
            <input type="email" id="email" name="email" required
                   placeholder="user@example.com">
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="password">Пароль</label>
            <div class="input-icon">🔒</div>
            <input type="password" id="password" name="password" required
                   minlength="6" placeholder="• • • • • • • •">
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
            <label for="confirmPassword">Подтвердите пароль</label>
            <div class="input-icon">🔐</div>
            <input type="password" id="confirmPassword" name="confirmPassword" required
                   minlength="6" placeholder="Повторите пароль">
            <div id="passwordMatch" class="password-match hidden"></div>
        </div>

        <button type="submit" id="submitBtn" disabled>Создать аккаунт</button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem; color: #718096; font-size: 0.9rem;">
        Уже есть аккаунт? <a href="/login" style="color: #667eea; text-decoration: none;">Войти</a>
    </div>
</div>
<script>
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const passwordMatch = document.getElementById('passwordMatch');
    const messageDiv = document.getElementById('message');

    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');

    // Проверка совпадения паролей
    function checkPasswordMatch() {
        const match = password.value === confirmPassword.value;
        passwordMatch.textContent = match ? 'Пароли совпадают ✓' : 'Пароли не совпадают ✗';
        passwordMatch.className = `password-match ${match ? 'match' : 'mismatch'}`;
        passwordMatch.classList.toggle('hidden', !password.value || !confirmPassword.value);
        updateSubmitButton();
    }

    // Валидация формы
    function validateForm() {
        const username = usernameInput.value;
        const email = emailInput.value;
        const passwordValue = password.value;

        if (username.length < 3 || username.length > 20) return false;
        if (!email.includes('@')) return false;
        if (passwordValue.length < 6) return false;
        if (passwordValue !== confirmPassword.value) return false;

        return true;
    }

    // Обновление кнопки
    function updateSubmitButton() {
        submitBtn.disabled = !validateForm();
    }

    // События
    password.addEventListener('input', checkPasswordMatch);
    confirmPassword.addEventListener('input', checkPasswordMatch);
    ['username', 'email', 'password', 'confirmPassword'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateSubmitButton);
    });

    // Отправка JSON
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        clearFieldErrors();
        messageDiv.classList.add('hidden');

        const formData = {
            username: usernameInput.value,
            email: emailInput.value,
            password: password.value
        };

        try {
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка...';

            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (response.ok) {
                showMessage('Письмо отправлено! Проверьте почту.', 'success');
                form.reset();
                updateSubmitButton();
                passwordMatch.classList.add('hidden');
            } else {
                handleApiError(result);
            }
        } catch (error) {
            showMessage('Ошибка сети. Попробуйте позже.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Создать аккаунт';
        }
    });

    // Отображение сообщения
    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        messageDiv.classList.remove('hidden');
    }

    // Очистка ошибок полей
    function clearFieldErrors() {
        usernameInput.style.borderColor = '#e2e8f0';
        emailInput.style.borderColor = '#e2e8f0';
    }

    // Обработка ошибок API
    function handleApiError(result) {
        // result.code — это поле, которое бэк должен присылать
        switch (result.code) {
            case 'EMAIL_ALREADY_EXISTS':
                emailInput.style.borderColor = '#721c24';
                showMessage('Пользователь с таким email уже существует', 'error');
                break;
            case 'USERNAME_ALREADY_EXISTS':
                usernameInput.style.borderColor = '#721c24';
                showMessage('Пользователь с таким логином уже существует', 'error');
                break;
            case 'USER_ALREADY_EXISTS':
                showMessage('Пользователь с таким email или логином уже существует', 'error');
                break;
            default:
                showMessage(result.message || 'Ошибка регистрации', 'error');
        }
    }
</script>
</body>
</html>
